server:
  port: ${PORT:8080}

api:
  prefix: api/v1

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/InternHubPMProd}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public


  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

security:
  internal-secret: ${INTERNAL_SECRET_KEY}
  internal-path-prefix: /pm/internal/

common:
  context:
    enabled: true

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 36000000
