spring:
  application:
    name: intern-hub-pm-service
  jmx:
    enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
server:
  port: 8080
  tomcat:
    threads:
      max: 20
      min-spare: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true

audit:
  data:
    enabled: false

api:
  prefix: /pm

security:
  internal-secret: ${INTERNAL_SECRET_KEY}
  internal-path-prefix: /pm/internal/

common:
  context:
    enabled: true

services:
  dms:
    url: ${DMS_SERVICE_URL:http://localhost:8084}
    system-actor-id: ${DMS_SYSTEM_ACTOR_ID:0}
  hrm:
    url: ${HRM_SERVICE_URL:http://localhost:8081}

logging:
  level:
    root: INFO
    com.intern.hub: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.apache.catalina: WARN
    org.apache.coyote: WARN
    org.apache.tomcat: WARN

gateway-url: ${GATEWAY_URL}
