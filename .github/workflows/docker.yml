name: Docker Build & Push to Harbor

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'infra/**'
      - 'core/**'
      - 'app/**'
      - 'libs.versions.toml'
      - 'build.gradle.kts'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image with Jib
        env:
          JIB_TO_AUTH_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JIB_TO_AUTH_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./gradlew :api:jib -Djib.to.image=${{ secrets.DOCKERHUB_REGISTRY }}/internhub-v2/dev/pm:latest
